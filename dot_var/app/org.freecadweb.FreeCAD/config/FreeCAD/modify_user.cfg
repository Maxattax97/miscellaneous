#!/usr/bin/env python3

import io
import os
import sys
import xml.etree.ElementTree as ET


GENERAL_SETTINGS = {
    "SubstituteDecimalSeparator": ("FCBool", "Value", "0"),
    "UseLocaleFormatting": ("FCInt", "Value", "0"),
    "EnableCursorBlinking": ("FCBool", "Value", "1"),
    "ShowSplasher": ("FCBool", "Value", "1"),
    "ToolbarIconSize": ("FCInt", "Value", "24"),
    "RecentIncludesExported": ("FCBool", "Value", "0"),
    "ConfirmAll": ("FCBool", "Value", "1"),
    "RecentIncludesImported": ("FCBool", "Value", "1"),
}

UNITS_SETTINGS = {
    "UserSchema": ("FCInt", "Value", "0"),
    "Decimals": ("FCInt", "Value", "3"),
    "FracInch": ("FCInt", "Value", "8"),
    "IgnoreProjectSchema": ("FCBool", "Value", "1"),
}

MACRO_SETTINGS = {
    "LocalEnvironment": ("FCBool", "Value", "1"),
    "MacroPath": ("FCText", None, None),
    "RecordGui": ("FCBool", "Value", "1"),
    "GuiAsComment": ("FCBool", "Value", "1"),
    "ScriptToPyConsole": ("FCBool", "Value", "1"),
    "ScriptToFile": ("FCBool", "Value", "0"),
}


def ensure_group(parent, name):
    for child in parent.findall("FCParamGroup"):
        if child.get("Name") == name:
            return child
    return ET.SubElement(parent, "FCParamGroup", {"Name": name})


def ensure_setting(group, name, spec, home_dir):
    tag, attr_name, attr_value = spec
    for child in list(group):
        if child.tag == tag and child.get("Name") == name:
            elem = child
            break
    else:
        elem = ET.SubElement(group, tag, {"Name": name})

    if tag == "FCText":
        if name == "MacroPath":
            elem.text = f"{home_dir}/.var/app/org.freecadweb.FreeCAD/data/FreeCAD/Macro"
    else:
        elem.set(attr_name, attr_value)


def build_initial_tree():
    root = ET.Element("FCParameters")
    root_group = ET.SubElement(root, "FCParamGroup", {"Name": "Root"})
    base_app = ET.SubElement(root_group, "FCParamGroup", {"Name": "BaseApp"})
    preferences = ET.SubElement(base_app, "FCParamGroup", {"Name": "Preferences"})
    ET.SubElement(preferences, "FCParamGroup", {"Name": "General"})
    ET.SubElement(preferences, "FCParamGroup", {"Name": "Units"})
    ET.SubElement(preferences, "FCParamGroup", {"Name": "Macro"})
    return ET.ElementTree(root)


def main():
    current = sys.stdin.read()
    home_dir = os.environ.get("HOME", "")

    if current.strip():
        try:
            tree = ET.ElementTree(ET.fromstring(current))
        except ET.ParseError:
            sys.stdout.write(current)
            return
    else:
        tree = build_initial_tree()

    root = tree.getroot()
    root_group = ensure_group(root, "Root")
    base_app = ensure_group(root_group, "BaseApp")
    preferences = ensure_group(base_app, "Preferences")
    general = ensure_group(preferences, "General")
    units = ensure_group(preferences, "Units")
    macro = ensure_group(preferences, "Macro")

    for name, spec in GENERAL_SETTINGS.items():
        ensure_setting(general, name, spec, home_dir)

    for name, spec in UNITS_SETTINGS.items():
        ensure_setting(units, name, spec, home_dir)

    for name, spec in MACRO_SETTINGS.items():
        ensure_setting(macro, name, spec, home_dir)

    ET.indent(tree, space="  ")
    buffer = io.BytesIO()
    tree.write(buffer, encoding="utf-8", xml_declaration=True)
    sys.stdout.write(buffer.getvalue().decode("utf-8"))


if __name__ == "__main__":
    main()
